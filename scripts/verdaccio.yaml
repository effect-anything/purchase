storage: ../tmp/local-registry/storage

uplinks:
  npmjs:
    url: https://registry.npmjs.org/

packages:
  "@effect-x/*":
    access: $all
    publish: $all
    unpublish: $all
    proxy: npmjs

  "@effect/*":
    access: $all
    publish: $all
    unpublish: $all
    proxy: npmjs

  "**":
    access: $all
    publish: $all
    unpublish: $all
    proxy: npmjs
